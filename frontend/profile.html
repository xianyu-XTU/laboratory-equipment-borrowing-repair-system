<!doctype html><html><head><meta charset="utf-8"><title>个人中心</title>
<style>body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:0;background:#f5f7fb;color:#222}.top{background:#1f2937;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}.wrap{max-width:900px;margin:24px auto;padding:0 16px}.card{background:#fff;border-radius:10px;padding:18px;margin-bottom:18px;box-shadow:0 2px 12px rgba(0,0,0,.06)}input{padding:9px;margin:4px;border:1px solid #ddd;border-radius:6px}button{padding:9px 14px;margin:4px;border:0;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}.secondary{background:#6b7280}</style>
</head><body><div class="top"><b>个人中心</b><span><button class="secondary" onclick="back()">返回</button><button class="secondary" onclick="logout()">退出</button></span></div><div class="wrap">
<div class="card"><h2>资料</h2><p id="info"></p><input id="realName" placeholder="真实姓名"><input id="phone" placeholder="手机号"><input id="email" placeholder="邮箱"><button onclick="saveProfile()">保存资料</button></div>
<div class="card"><h2>修改密码</h2><input id="oldPassword" type="password" placeholder="原密码"><input id="newPassword" type="password" placeholder="新密码"><button onclick="changePassword()">修改密码</button></div>
</div><script src="js/api.js"></script><script>
if(requireLogin()){ safeRun(loadProfile); }
function back(){ const u=getLoginUser(); if(!u) return location.href='login.html'; if(u.roleCode==='ADMIN') location.href='board_admin.html'; else if(u.roleCode==='LAB_ADMIN') location.href='board_lab.html'; else location.href='board_student.html'; }
async function loadProfile(){ const data=await request('/api/profile'); const u=data.user; info.innerText=`用户名：${u.username}，角色：${data.role?data.role.roleName:u.roleId}`; realName.value=u.realName||''; phone.value=u.phone||''; email.value=u.email||''; }
async function saveProfile(){ await safeRun(async()=>{ await request('/api/profile',{method:'PUT',body:JSON.stringify({realName:realName.value,phone:phone.value,email:email.value})}); alert('保存成功'); await loadProfile(); }); }
async function changePassword(){ await safeRun(async()=>{ await request('/api/profile/password',{method:'PUT',body:JSON.stringify({oldPassword:oldPassword.value,newPassword:newPassword.value})}); alert('密码修改成功，请重新登录'); logout(); }); }
</script></body></html>
