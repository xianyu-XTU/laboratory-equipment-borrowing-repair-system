<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>实验室设备管理系统 | 登录/注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e9f0f5 0%, #d4e3ed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* 卡片容器 */
        .card {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: all 0.2s ease;
            z-index: 2;
        }

        /* 头部区域 */
        .header {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
            background: white;
            border-bottom: 1px solid #ecf3f8;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 600;
            color: #1f5e7e;
            margin-bottom: 0.3rem;
        }

        .sub {
            color: #5d7180;
            font-size: 0.85rem;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* 选项卡切换 */
        .tabs {
            display: flex;
            background: #f8fafc;
            padding: 0;
            border-bottom: 1px solid #e2edf2;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 1rem 0;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: #5c6f82;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .tab-btn.active {
            color: #2c7da0;
            background: white;
            border-bottom: 2px solid #2c7da0;
            margin-bottom: -1px;
        }

        /* 表单容器 */
        .form-container {
            padding: 2rem 2rem 2rem 2rem;
            background: white;
        }

        .form-panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .form-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 1.3rem;
            position: relative;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #cfdfe8;
            border-radius: 1.2rem;
            font-size: 0.9rem;
            background-color: #fff;
            transition: 0.2s;
            outline: none;
            color: #1f2f3a;
        }

        .input-group select {
            appearance: none;
            cursor: pointer;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%238096a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.2);
        }

        /* 双列布局 (注册手机+真实姓名) */
        .row-2col {
            display: flex;
            gap: 12px;
        }
        .row-2col .input-group {
            flex: 1;
        }

        /* 提示信息 */
        .form-message {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 1rem;
        }

        /* 按钮 */
        .btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            background: #2c7da0;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.8rem;
        }

        .btn:hover {
            background: #216180;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* 底部辅助信息 */
        .footer-note {
            border-top: 1px solid #ecf3f8;
            background: #fefefe;
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #7b8c9c;
        }

        /* 响应式调整 */
        @media (max-width: 550px) {
            .card {
                max-width: 98%;
            }
            .form-container {
                padding: 1.5rem;
            }
            .row-2col {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo">
            <span>LabEquip</span>
        </div>
        <div class="sub">实验室设备智能管理系统</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="loginTabBtn">登录</button>
        <button class="tab-btn" id="registerTabBtn">注册</button>
    </div>

    <div class="form-container">
        <!-- 登录表单面板 -->
        <div id="loginPanel" class="form-panel active">
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn">登录系统</button>
                <div id="loginMessage" class="form-message"></div>
            </form>
            <div style="margin-top: 1rem; text-align: center; font-size: 0.75rem; color: #6c8b9b;">
                预设账号: admin, lab, student (密码均为123456)
            </div>
        </div>

        <!-- 注册表单面板 -->
        <div id="registerPanel" class="form-panel">
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="用户名 *" autocomplete="off" required>
                </div>
                <div class="row-2col">
                    <div class="input-group">
                        <input type="text" id="regRealName" placeholder="真实姓名 *" required>
                    </div>
                    <div class="input-group">
                        <input type="tel" id="regPhone" placeholder="手机号 *" required>
                    </div>
                </div>
                <div class="row-2col">
                    <div class="input-group">
                        <input type="password" id="regPassword" placeholder="密码 * (至少6位)" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="regConfirmPwd" placeholder="确认密码 *" required>
                    </div>
                </div>
                <div class="input-group">
                    <select id="regRole" required>
                        <option value="" disabled selected>-- 选择角色 --</option>
                        <option value="学生">学生</option>
                        <option value="实验员">实验员</option>
                        <option value="管理员">管理员</option>
                    </select>
                </div>
                <button type="submit" class="btn">立即注册</button>
                <div id="registerMessage" class="form-message"></div>
            </form>
        </div>
    </div>
    <div class="footer-note">
        实验室设备管理系统
    </div>
</div>

<script>
    // ---------- 模拟本地数据库 ----------
    const STORAGE_KEY = "lab_equipment_users";
    const defaultUsers = [
        {
            id: 1,
            username: "admin",
            password: "123456",
            realName: "系统管理员",
            phone: "13800000000",
            role: "管理员",
            roleCode: "ADMIN"
        },
        {
            id: 2,
            username: "lab",
            password: "123456",
            realName: "实验员",
            phone: "13800000001",
            role: "实验员",
            roleCode: "LAB_ADMIN"
        },
        {
            id: 3,
            username: "student",
            password: "123456",
            realName: "学生用户",
            phone: "13800000002",
            role: "学生",
            roleCode: "STUDENT"
        }
    ];

    // 初始化本地用户数据 
    function initUserData() {
        const existing = localStorage.getItem(STORAGE_KEY);
        if (!existing) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultUsers));
        } else {
            let users = JSON.parse(existing);
            const presetUsernames = defaultUsers.map(u => u.username);
            let needUpdate = false;
            for (let preset of defaultUsers) {
                if (!users.some(u => u.username === preset.username)) {
                    users.push(preset);
                    needUpdate = true;
                }
            }
            if (needUpdate) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            }
        }
    }

    // 获取所有用户
    function getUsers() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    // 保存用户
    function saveUsers(users) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    // 检查用户名唯一性
    function isUsernameUnique(username, excludeId = null) {
        const users = getUsers();
        return !users.some(user => user.username === username && (excludeId === null || user.id !== excludeId));
    }

    // 检查手机号唯一性
    function isPhoneUnique(phone, excludeId = null) {
        const users = getUsers();
        return !users.some(user => user.phone === phone && (excludeId === null || user.id !== excludeId));
    }

    // 手机号简单校验
    function validatePhone(phone) {
        const phoneRegex = /^1[3-9]\d{9}$/;
        return phoneRegex.test(phone);
    }

    // 注册新用户
    function registerNewUser(username, realName, phone, password, role) {
        if (!username || !realName || !phone || !password || !role) {
            return { success: false, message: "请填写所有必填项！" };
        }
        if (username.length < 3) {
            return { success: false, message: "用户名长度至少3个字符" };
        }
        if (password.length < 6) {
            return { success: false, message: "密码长度至少6位" };
        }
        if (!validatePhone(phone)) {
            return { success: false, message: "手机号格式不正确（须为11位有效手机号）" };
        }
        if (!isUsernameUnique(username)) {
            return { success: false, message: "用户名已存在，请更换" };
        }
        if (!isPhoneUnique(phone)) {
            return { success: false, message: "手机号已被注册，请联系管理员" };
        }

        const users = getUsers();
        const newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 4;
        let roleCode = "";
        if (role === "学生") roleCode = "STUDENT";
        else if (role === "实验员") roleCode = "LAB_ADMIN";
        else if (role === "管理员") roleCode = "ADMIN";
        
        const newUser = {
            id: newId,
            username: username,
            password: password,
            realName: realName,
            phone: phone,
            role: role,
            roleCode: roleCode
        };
        users.push(newUser);
        saveUsers(users);
        return { success: true, message: "注册成功！请登录", user: newUser };
    }

    // 登录校验
    function loginUser(username, password) {
        if (!username || !password) {
            return { success: false, message: "请输入用户名和密码" };
        }
        const users = getUsers();
        const user = users.find(u => u.username === username && u.password === password);
        if (!user) {
            return { success: false, message: "用户名或密码错误" };
        }
        return { 
            success: true, 
            message: `欢迎回来，${user.realName} (${user.role}) · 实验室设备系统已就绪`,
            user: user
        };
    }

    // ----- UI 动态效果 & 表单切换 ----
    const loginPanel = document.getElementById('loginPanel');
    const registerPanel = document.getElementById('registerPanel');
    const loginTabBtn = document.getElementById('loginTabBtn');
    const registerTabBtn = document.getElementById('registerTabBtn');

    function switchToLogin() {
        loginPanel.classList.add('active');
        registerPanel.classList.remove('active');
        loginTabBtn.classList.add('active');
        registerTabBtn.classList.remove('active');
        document.getElementById('loginMessage').innerHTML = '';
        document.getElementById('registerMessage').innerHTML = '';
    }

    function switchToRegister() {
        registerPanel.classList.add('active');
        loginPanel.classList.remove('active');
        registerTabBtn.classList.add('active');
        loginTabBtn.classList.remove('active');
        document.getElementById('loginMessage').innerHTML = '';
        document.getElementById('registerMessage').innerHTML = '';
    }

    loginTabBtn.addEventListener('click', switchToLogin);
    registerTabBtn.addEventListener('click', switchToRegister);

    // 登录表单提交逻辑
    const loginForm = document.getElementById('loginForm');
    const loginMessageDiv = document.getElementById('loginMessage');

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const result = loginUser(username, password);
        if (result.success) {
            loginMessageDiv.innerHTML = `<span style="color: #2c7da0;">✓ ${result.message}</span>`;
            loginMessageDiv.style.color = "#155f7c";
            sessionStorage.setItem("lab_logged_user", JSON.stringify({ 
                username: result.user.username, 
                role: result.user.role,
                realName: result.user.realName
            }));
            setTimeout(() => {
                alert(`登录成功！\n${result.message}\n即将跳转至控制台（演示）`);
            }, 50);
        } else {
            loginMessageDiv.innerHTML = `<span style="color: #e25c5c;">✗ ${result.message}</span>`;
            loginMessageDiv.style.color = "#e25c5c";
        }
    });

    // 注册表单提交逻辑
    const registerForm = document.getElementById('registerForm');
    const registerMessageDiv = document.getElementById('registerMessage');

    registerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('regUsername').value.trim();
        const realName = document.getElementById('regRealName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const confirmPwd = document.getElementById('regConfirmPwd').value.trim();
        const role = document.getElementById('regRole').value;

        // 前端手工二次校验
        if (!username || !realName || !phone || !password || !confirmPwd || !role) {
            registerMessageDiv.innerHTML = `<span style="color: #e25c5c;">请填写完整所有字段（包含角色）</span>`;
            return;
        }
        if (password !== confirmPwd) {
            registerMessageDiv.innerHTML = `<span style="color: #e25c5c;">两次输入的密码不一致</span>`;
            return;
        }
        if (password.length < 6) {
            registerMessageDiv.innerHTML = `<span style="color: #e25c5c;">密码长度至少6位</span>`;
            return;
        }
        if (!validatePhone(phone)) {
            registerMessageDiv.innerHTML = `<span style="color: #e25c5c;">手机号格式错误（11位手机号）</span>`;
            return;
        }

        const result = registerNewUser(username, realName, phone, password, role);
        if (result.success) {
            registerMessageDiv.innerHTML = `<span style="color: #2c7da0;">✓ ${result.message}</span>`;
            document.getElementById('regUsername').value = '';
            document.getElementById('regRealName').value = '';
            document.getElementById('regPhone').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPwd').value = '';
            document.getElementById('regRole').value = '';
            
            setTimeout(() => {
                switchToLogin();
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginPassword').value = '';
                registerMessageDiv.innerHTML = ''; 
                const loginMsg = document.getElementById('loginMessage');
                loginMsg.innerHTML = `<span style="color: #2c7da0;">账号注册成功，请输入密码登录</span>`;
                setTimeout(() => {
                    if(loginMsg.innerHTML.includes("注册成功")) loginMsg.innerHTML = '';
                }, 3000);
            }, 1200);
        } else {
            registerMessageDiv.innerHTML = `<span style="color: #e25c5c;">${result.message}</span>`;
        }
    });

    const clearLoginErr = () => { document.getElementById('loginMessage').innerHTML = ''; };
    document.getElementById('loginUsername').addEventListener('input', clearLoginErr);
    document.getElementById('loginPassword').addEventListener('input', clearLoginErr);
    
    const clearRegErr = () => { document.getElementById('registerMessage').innerHTML = ''; };
    document.getElementById('regUsername').addEventListener('input', clearRegErr);
    document.getElementById('regRealName').addEventListener('input', clearRegErr);
    document.getElementById('regPhone').addEventListener('input', clearRegErr);
    document.getElementById('regPassword').addEventListener('input', clearRegErr);
    document.getElementById('regConfirmPwd').addEventListener('input', clearRegErr);
    document.getElementById('regRole').addEventListener('change', clearRegErr);

    initUserData();
    
    console.log("实验室设备管理系统已启动 | 预设账号: admin, lab, student (密码均为123456)");
</script>
</body>
</html>
